<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="System Programming">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="24" y="24" width="464" height="464" rx="96" fill="url(#bg)"/>

  <!-- chip body -->
  <rect x="156" y="156" width="200" height="200" rx="24" fill="#0b1220" stroke="#334155" stroke-width="10"/>

  <!-- chip pins -->
  <g stroke="#64748b" stroke-width="10" stroke-linecap="round">
    <line x1="206" y1="118" x2="206" y2="156"/>
    <line x1="256" y1="118" x2="256" y2="156"/>
    <line x1="306" y1="118" x2="306" y2="156"/>

    <line x1="206" y1="356" x2="206" y2="394"/>
    <line x1="256" y1="356" x2="256" y2="394"/>
    <line x1="306" y1="356" x2="306" y2="394"/>

    <line x1="118" y1="206" x2="156" y2="206"/>
    <line x1="118" y1="256" x2="156" y2="256"/>
    <line x1="118" y1="306" x2="156" y2="306"/>

    <line x1="356" y1="206" x2="394" y2="206"/>
    <line x1="356" y1="256" x2="394" y2="256"/>
    <line x1="356" y1="306" x2="394" y2="306"/>
  </g>

  <!-- inner circuit lines -->
  <g stroke="url(#accent)" stroke-width="10" stroke-linecap="round" fill="none">
    <path d="M206 246h40"/>
    <path d="M266 246h40"/>
    <path d="M246 206v40"/>
    <path d="M246 266v40"/>
  </g>

  <!-- center dot -->
  <circle cx="256" cy="256" r="20" fill="url(#accent)"/>
</svg>
